name: Nightly - Full Regression Suite

on:
  schedule:
    - cron: "0 1 * * *"   # Every day at 1 AM UTC
  workflow_dispatch:
    inputs:
      parallel_threads:
        description: "Number of parallel threads"
        required: false
        default: "4"

env:
  JAVA_VERSION: "17"

jobs:
  nightly-regression:
    name: Nightly Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install Chrome
        if: matrix.browser == 'chrome'
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Verify Firefox
        if: matrix.browser == 'firefox'
        run: firefox --version

      - name: Run Full Regression
        run: |
          mvn test \
            -Pregression \
            -Dbrowser=${{ matrix.browser }}_headless \
            -Dheadless=true

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-allure-${{ matrix.browser }}
          path: target/allure-results/
          retention-days: 30

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-screenshots-${{ matrix.browser }}
          path: test-output/screenshots/
          retention-days: 7

  nightly-bdd:
    name: Nightly BDD Suite
    runs-on: ubuntu-latest
    needs: nightly-regression
    if: always() && needs.nightly-regression.result != 'cancelled'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Run All BDD Scenarios
        run: |
          mvn test \
            -Pbdd \
            -Dbrowser=chrome_headless \
            -Dheadless=true

      - name: Upload Cucumber Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-cucumber
          path: target/cucumber-reports/
          retention-days: 30
