# =============================================
# Selenium Enterprise Framework - Configuration
# =============================================

# Application
base.url=https://www.saucedemo.com
environment=qa

# Browser (chrome | firefox | edge | chrome_headless | firefox_headless)
browser=chrome
headless=false

# Timeouts (seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=60

# Selenium Grid / Remote
remote=false
grid.url=http://localhost:4444/wd/hub

# Reporting
extent.report.path=test-output/ExtentReport.html
screenshot.dir=test-output/screenshots

# Retry
retry.count=1

# Test Data
testdata.json.path=src/test/resources/testdata/testdata.json
testdata.excel.path=src/test/resources/testdata/testdata.xlsx

# API (for hybrid API + UI testing)
api.base.url=https://reqres.in/api
api.timeout=30
